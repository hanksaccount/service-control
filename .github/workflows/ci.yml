name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python3 -m py_compile service-agent/agent.py service-agent/test_agent.py
      - run: python3 -m unittest discover -s service-agent -p "test_*.py"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.1.0"
      - uses: actions/setup-node@v6
        if: hashFiles('package.json', 'package-lock.json') != ''
        with:
          node-version: 24
          cache: npm
      - run: gradle test assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: service-control-debug
          path: app/build/outputs/apk/debug/app-debug.apk
